spring.application.name=api-gateway
server.port=${API_GATEWAY_PORT:8080}

eureka.client.serviceUrl.defaultZone=http://service-discovery:8761/eureka/
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
spring.cloud.gateway.server.webflux.discovery.locator.enabled=true
spring.cloud.gateway.server.webflux.discovery.locator.lower-case-service-id=true

eureka.instance.prefer-ip-address=true
eureka.instance.instance-id=${spring.cloud.client.ip-address}:${server.port}

# --- ROTAS DO GATEWAY ---

# 1. Rota para o Auth Service
spring.cloud.gateway.server.webflux.routes[0].id=auth-service
spring.cloud.gateway.server.webflux.routes[0].uri=lb://auth-service
spring.cloud.gateway.server.webflux.routes[0].predicates[0]=Path=/api/v1/auth/**, /api/v1/users/**

# 2. Rota para os Endpoints REST do Chat
spring.cloud.gateway.server.webflux.routes[1].id=chat-service
spring.cloud.gateway.server.webflux.routes[1].uri=lb://chat-service
spring.cloud.gateway.server.webflux.routes[1].predicates[0]=Path=/api/v1/rooms/**, /api/v1/messages/**

# 3. Rota para o WebSocket
spring.cloud.gateway.server.webflux.routes[2].id=chat-service-ws
spring.cloud.gateway.server.webflux.routes[2].uri=lb://chat-service
spring.cloud.gateway.server.webflux.routes[2].predicates[0]=Path=/ws/chat/**

spring.cloud.gateway.server.webflux.globalcors.cors-configurations.[/ws/**].allowedOrigins=http://localhost:3000
spring.cloud.gateway.server.webflux.globalcors.cors-configurations.[/ws/**].allowedMethods=GET

# --- CONFIGURAÇÃO DE CORS (GLOBAL) ---
spring.cloud.gateway.server.webflux.globalcors.cors-configurations.[/**].allowedOrigins=http://localhost:3000
spring.cloud.gateway.server.webflux.globalcors.cors-configurations.[/**].allowedMethods=GET,POST,PUT,PATCH,DELETE,OPTIONS
spring.cloud.gateway.server.webflux.globalcors.cors-configurations.[/**].allowedHeaders=*

logging.level.org.springframework.cloud.gateway=DEBUG
logging.level.reactor.netty.http.client=DEBUG
